# electron-builder configuration for octomux desktop app.
# Build with: bun run dist:electron
#
# Native modules (better-sqlite3, node-pty) are rebuilt for Electron's ABI
# automatically via npmRebuild: true. The mechanism is @electron/rebuild, which
# electron-builder invokes internally during the packaging step.

appId: io.ostium.octomux
productName: octomux

# Ad-hoc sign the .app after packing (we have no Developer ID). electron-builder
# can't ad-hoc sign on its own (identity: '-' is read as a keychain name and
# signing is skipped → unsigned → "damaged"), so a hook runs `codesign --sign -`.
afterPack: scripts/electron-adhoc-sign.cjs

# Entry point for the Electron main process (overrides package.json "main"
# only within the packaged app via extraMetadata, so the npm CLI main is untouched).
extraMetadata:
  main: dist-electron/main.js

directories:
  output: release

# Files to include in the package. node_modules/** pulls in runtime deps;
# the three dist dirs carry compiled JS.
files:
  - dist/**
  - dist-server/**
  - dist-electron/**
  - node_modules/**
  - package.json

# These native/binary directories must be outside the asar archive so
# Node can dlopen .node files and exec the tmux binary at runtime.
asarUnpack:
  - '**/node_modules/node-pty/**'
  - '**/node_modules/better-sqlite3/**'
  - '**/node_modules/@octomux/tmux-darwin-arm64/**'
  - '**/node_modules/@octomux/tmux-darwin-x64/**'
  - '**/node_modules/@octomux/tmux-linux-x64/**'
  - '**/node_modules/@octomux/tmux-linux-arm64/**'

# Rebuild native modules (better-sqlite3, node-pty) for Electron's ABI.
# Mechanism: electron-builder calls @electron/rebuild under the hood when
# npmRebuild is true.
npmRebuild: true

# Compile native deps from source instead of downloading prebuilt binaries.
# Without this, @electron/rebuild fetched a prebuilt better-sqlite3 for the
# WRONG arch (x86_64) on the arm64 runner — the packaged app then crashed at
# boot with "incompatible architecture (have 'x86_64', need 'arm64')" and
# showed a blank window. node-pty was unaffected (it has no matching prebuild,
# so it already compiled from source). Building from source pins the arch to
# the build host/target. (Requires the Python 3.11 step in electron-release.yml
# for node-gyp's distutils.)
buildDependenciesFromSource: true

# Where built installers are uploaded. The electron-release workflow runs with
# `--publish always`, which attaches the artifacts to the GitHub Release at
# https://github.com/ShreyPaharia/octomux/releases.
#
# releaseType: release — publish.yml already creates the v<ver> release (a
# PUBLISHED release, with notes). electron-builder defaults to publishing into a
# DRAFT, and on a type mismatch it SKIPS uploading ("existing type not
# compatible with publishing type"). Setting 'release' makes it upload into the
# existing published release instead of skipping.
publish:
  provider: github
  owner: ShreyPaharia
  repo: octomux
  releaseType: release

# macOS target
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  # No Developer ID → disable electron-builder's signing; the afterPack hook
  # (scripts/electron-adhoc-sign.cjs) ad-hoc signs with `codesign --sign -`,
  # which produces a VALID seal (electron-builder's own attempts left it
  # unsigned or with a broken seal → "damaged"). Not notarized: downloaded
  # copies still hit the "unidentified developer" prompt → right-click → Open.
  # Real fix = Developer ID cert (CSC_LINK/CSC_KEY_PASSWORD) + notarization.
  identity: null

# Windows target
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64

# Linux targets
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Development
