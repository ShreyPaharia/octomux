# build-binaries.yml — Build and publish per-platform static tmux binaries.
#
# Triggers:
#   - push to main / PRs to main: build only (verify the static tmux compiles)
#   - release tag (v*): build + publish each @octomux/tmux-* package to npm
#   - workflow_dispatch: build + publish at the current package.json version
#     (used to publish platforms whose runner was unavailable at tag time)
#
# Each matrix job builds tmux for ITS platform AND publishes ITS OWN package.
# Publishing is per-platform and independent, so an unavailable runner (e.g. the
# macos-13 Intel runner) only delays its own package — it never blocks the
# others. Re-running publishes any platform not yet on npm (idempotent).
#
# NOTE: node-pty delivery is intentionally NOT handled here. npm/CLI users get
# node-pty from upstream (Linux compiles from source — a known gap), and the
# Electron app rebuilds node-pty for its ABI at package time via electron-builder
# (npmRebuild). Wiring our own node-pty prebuilds into the install is a separate
# TODO and must consume them somewhere.

name: Build Binaries

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      id-token: write # npm provenance

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (Apple Silicon)
          - runner: macos-14
            platform: darwin
            arch: arm64

          # macOS x64 (Intel)
          - runner: macos-13
            platform: darwin
            arch: x64

          # Linux x64
          - runner: ubuntu-latest
            platform: linux
            arch: x64

          # Linux arm64
          # NOTE: 'ubuntu-24.04-arm' is GitHub's hosted arm64 runner label.
          # If unavailable, replace with a self-hosted arm64 runner or QEMU emulation.
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl bzip2 zlib1g-dev

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          # Xcode CLT provides clang + make. pkg-config needed for configure checks.
          brew install pkg-config || true

      - name: Build tmux binary
        run: bash scripts/build-tmux.sh

      - name: Upload tmux package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmux-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/tmux-${{ matrix.platform }}-${{ matrix.arch }}/
          retention-days: 30

      # Publish THIS platform's package — on a tag or a manual dispatch.
      # Independent per-platform: a stuck runner can't block the other packages.
      - name: Publish @octomux/tmux-${{ matrix.platform }}-${{ matrix.arch }}
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        working-directory: packages/tmux-${{ matrix.platform }}-${{ matrix.arch }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          PKG="@octomux/tmux-${{ matrix.platform }}-${{ matrix.arch }}"
          # Version: from the tag (v1.2.3 -> 1.2.3), else the repo package.json.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="$(node -p "require('../../package.json').version")"
          fi
          echo "Target: $PKG@$VER"
          chmod +x bin/tmux
          npm version "$VER" --no-git-tag-version --allow-same-version
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already on npm — skipping publish"
          else
            npm publish --access public
          fi
